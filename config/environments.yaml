environments:
  dev:
    database: RETAIL_AI_DEV
    schema: ANALYTICS
    semantic_schema: SEMANTIC
    warehouse: RETAIL_AI_EVAL_WH
    connection_name: default
    semantic_view: RETAIL_AI_DEV.SEMANTIC.RETAIL_ANALYTICS_SV
    agent_name: RETAIL_AI_DEV.SEMANTIC.RETAIL_AGENT

  prod:
    database: RETAIL_AI_PROD
    schema: ANALYTICS
    semantic_schema: SEMANTIC
    warehouse: RETAIL_AI_EVAL_WH
    connection_name: default
    semantic_view: RETAIL_AI_PROD.SEMANTIC.RETAIL_ANALYTICS_SV
    agent_name: RETAIL_AI_PROD.SEMANTIC.RETAIL_AGENT

eval:
  database: RETAIL_AI_EVAL
  schema: RESULTS
  warehouse: RETAIL_AI_EVAL_WH

llm:
  model: claude-opus-4-7
  judge_model: claude-opus-4-7
  analyst_model: default
