name: Agent CD - Promote to PROD

on:
  push:
    branches: [main]
    paths:
      - 'agents/**'

jobs:
  promote-agent-to-prod:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install snowflake-connector-python pyyaml

      - name: Run native Snowflake agent evaluation on TEST (GPA framework)
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python evaluation/audit_agent.py \
            --environment test \
            --agent-name RETAIL_AI_TEST.SEMANTIC.RETAIL_AGENT \
            --metrics answer_correctness,logical_consistency,safety,groundedness,execution_efficiency \
            --git-sha ${{ github.sha }} \
            --git-branch main \
            --timeout 600 \
            --output agent_eval_results.json

      - name: Check evaluation passed
        run: |
          python -c "
          import json, sys
          with open('agent_eval_results.json') as f:
              results = json.load(f)
          if not results.get('passed_threshold'):
              avg = results.get('overall_average', 0)
              print(f'NATIVE EVAL FAILED: Overall avg {avg}')
              for metric, score in results.get('metric_averages', {}).items():
                  print(f'  {metric}: {score:.3f}')
              sys.exit(1)
          print(f'Native eval PASSED: Overall avg {results.get(\"overall_average\", 0):.3f}')
          "

      - name: Deploy agent to PROD
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python -c "
          import snowflake.connector, os
          conn = snowflake.connector.connect(
              account=os.environ['SNOWFLAKE_ACCOUNT'],
              user=os.environ['SNOWFLAKE_USER'],
              password=os.environ['SNOWFLAKE_PASSWORD'],
              warehouse='RETAIL_AI_EVAL_WH'
          )
          with open('agents/prod/retail_agent.sql', 'r') as f:
              sql = f.read()
          for stmt in sql.split(';'):
              stmt = stmt.strip()
              if stmt:
                  conn.cursor().execute(stmt)
          print('Agent deployed to PROD')
          conn.close()
          "

      - name: Upload results artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-prod-promotion-results
          path: agent_eval_results.json
