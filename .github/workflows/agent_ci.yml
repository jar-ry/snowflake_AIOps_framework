name: Agent CI - Evaluate on PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'agents/**'
      - 'question_banks/agent/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  evaluate-agent:
    name: "Native Snowflake Agent Evaluation"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install snowflake-connector-python pyyaml

      - name: Deploy agent to DEV
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python -c "
          import snowflake.connector, os
          conn = snowflake.connector.connect(
              account=os.environ['SNOWFLAKE_ACCOUNT'],
              user=os.environ['SNOWFLAKE_USER'],
              password=os.environ['SNOWFLAKE_PASSWORD'],
              warehouse='RETAIL_AI_EVAL_WH'
          )
          with open('agents/dev/retail_agent.sql', 'r') as f:
              sql = f.read()
          for stmt in sql.split(';'):
              stmt = stmt.strip()
              if stmt:
                  conn.cursor().execute(stmt)
          print('Agent deployed to DEV')
          conn.close()
          "

      - name: Run native Snowflake agent evaluation (GPA framework)
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python evaluation/audit_agent.py \
            --environment dev \
            --agent-name RETAIL_AI_DEV.SEMANTIC.RETAIL_AGENT \
            --metrics answer_correctness,logical_consistency,safety,groundedness,execution_efficiency \
            --git-sha ${{ github.sha }} \
            --git-branch ${{ github.head_ref }} \
            --timeout 600 \
            --output agent_eval_results.json

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-results
          path: agent_eval_results.json

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let results;
            try {
              results = JSON.parse(fs.readFileSync('agent_eval_results.json', 'utf8'));
            } catch (e) {
              results = { status: 'NOT_RUN', metric_averages: {} };
            }

            const status = results.passed_threshold ? '✅ PASSED' :
                           results.status === 'COMPLETED' ? '❌ FAILED' : '⚠️ ' + (results.status || 'NOT_RUN');

            let metricTable = '';
            const metrics = results.metric_averages || {};
            for (const [metric, score] of Object.entries(metrics)) {
              const icon = score >= 0.7 ? '✅' : score >= 0.5 ? '⚠️' : '❌';
              metricTable += `| ${metric} | ${(score || 0).toFixed(3)} | ${icon} |\n`;
            }

            const snowsightLink = results.snowsight_url
              ? `\n[View in Snowsight AI Observability](${results.snowsight_url})\n`
              : '';

            const body = `## Agent CI Results — Native GPA Evaluation ${status}

            Uses Snowflake's built-in \`EXECUTE_AI_EVALUATION\` with GPA framework metrics.

            | Metric | Average Score | Status |
            |--------|---------------|--------|
            ${metricTable || '| _No metrics available_ | - | - |'}

            | Summary | Value |
            |---------|-------|
            | **Overall Average** | ${(results.overall_average || 0).toFixed(3)} |
            | **Threshold** | ${results.accuracy_threshold || 'N/A'}% |
            | **Total Records** | ${results.total_records || 'N/A'} |
            | **Low Scores (<0.5)** | ${results.low_score_count || 'N/A'} |
            ${snowsightLink}

            > Commit: \`${{ github.sha }}\` | Branch: \`${{ github.head_ref }}\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
