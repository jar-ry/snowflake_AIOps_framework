name: RETAIL_ANALYTICS_SV
description: Retail analytics semantic view for e-commerce data analysis

tables:
  - name: CUSTOMERS
    description: Customer master data
    base_table:
      database: RETAIL_AI_TEST
      schema: ANALYTICS
      table: CUSTOMERS
    primary_key:
      columns:
        - CUSTOMER_ID
    dimensions:
      - name: CUSTOMER_ID
        description: Unique identifier for each customer
        expr: CUSTOMER_ID
        data_type: VARCHAR
        unique: true
      - name: FIRST_NAME
        description: Customer first name
        expr: FIRST_NAME
        data_type: VARCHAR
      - name: LAST_NAME
        description: Customer last name
        expr: LAST_NAME
        data_type: VARCHAR
      - name: EMAIL
        description: Customer email address
        expr: EMAIL
        data_type: VARCHAR
      - name: CITY
        description: City where the customer is located
        expr: CITY
        data_type: VARCHAR
        sample_values:
          - New York
          - Los Angeles
          - Chicago
          - Houston
          - Phoenix
          - Seattle
          - Denver
          - Boston
          - Austin
          - Miami
      - name: STATE
        description: US state abbreviation
        expr: STATE
        data_type: VARCHAR
        sample_values:
          - NY
          - CA
          - IL
          - TX
          - AZ
          - WA
          - CO
          - MA
          - FL
        is_enum: true
      - name: COUNTRY
        description: Country code
        expr: COUNTRY
        data_type: VARCHAR
        sample_values:
          - US
        is_enum: true
      - name: CUSTOMER_SEGMENT
        synonyms:
          - segment
          - business segment
        description: Business segment classification
        expr: CUSTOMER_SEGMENT
        data_type: VARCHAR
        sample_values:
          - Consumer
          - Corporate
          - Small Business
          - Enterprise
        is_enum: true
      - name: LOYALTY_TIER
        synonyms:
          - tier
          - loyalty level
        description: Customer loyalty program tier
        expr: LOYALTY_TIER
        data_type: VARCHAR
        sample_values:
          - Bronze
          - Silver
          - Gold
          - Platinum
        is_enum: true
    time_dimensions:
      - name: CREATED_AT
        synonyms:
          - customer since
          - signup date
        description: Date the customer account was created
        expr: CREATED_AT
        data_type: TIMESTAMP
    facts:
      - name: LIFETIME_VALUE
        description: Total lifetime value in USD
        expr: LIFETIME_VALUE
        data_type: NUMBER
    metrics:
      - name: TOTAL_CUSTOMERS
        description: Total number of unique customers
        expr: COUNT(CUSTOMER_ID)
      - name: AVG_LIFETIME_VALUE
        description: Average customer lifetime value in USD
        expr: AVG(LIFETIME_VALUE)
    filters:
      - name: HIGH_VALUE_CUSTOMERS
        description: Customers with lifetime value above $10,000
        expr: LIFETIME_VALUE > 10000
      - name: PLATINUM_CUSTOMERS
        description: Customers in the Platinum loyalty tier
        expr: "LOYALTY_TIER = 'Platinum'"

  - name: PRODUCTS
    description: Product catalog
    base_table:
      database: RETAIL_AI_TEST
      schema: ANALYTICS
      table: PRODUCTS
    primary_key:
      columns:
        - PRODUCT_ID
    dimensions:
      - name: PRODUCT_ID
        description: Unique product identifier
        expr: PRODUCT_ID
        data_type: VARCHAR
        unique: true
      - name: PRODUCT_NAME
        description: Display name of the product
        expr: PRODUCT_NAME
        data_type: VARCHAR
      - name: CATEGORY
        synonyms:
          - product category
        description: Top-level product category
        expr: CATEGORY
        data_type: VARCHAR
        sample_values:
          - Electronics
          - Audio
          - Computing
          - Accessories
          - Wearables
        is_enum: true
      - name: SUBCATEGORY
        synonyms:
          - product subcategory
        description: Detailed product subcategory
        expr: SUBCATEGORY
        data_type: VARCHAR
        sample_values:
          - Displays
          - Input Devices
          - Laptops
          - Mice
          - Over-ear
          - Portable Audio
          - Smartwatches
          - Tablets
        is_enum: true
      - name: BRAND
        synonyms:
          - product brand
          - manufacturer
        description: Product brand name
        expr: BRAND
        data_type: VARCHAR
        sample_values:
          - TechCorp
          - SoundMax
          - PixelPro
          - KeyMaster
          - SwiftGear
          - NovaTech
        is_enum: true
      - name: IS_ACTIVE
        description: Whether the product is currently active for sale
        expr: IS_ACTIVE
        data_type: BOOLEAN
    time_dimensions:
      - name: LAUNCH_DATE
        description: Date the product was launched
        expr: LAUNCH_DATE
        data_type: DATE
    facts:
      - name: UNIT_PRICE
        description: Retail price per unit in USD
        expr: UNIT_PRICE
        data_type: NUMBER
      - name: COST_PRICE
        description: Cost of goods per unit in USD
        expr: COST_PRICE
        data_type: NUMBER
    metrics:
      - name: TOTAL_PRODUCTS
        description: Total number of products
        expr: COUNT(PRODUCT_ID)
      - name: AVG_UNIT_PRICE
        description: Average retail price across products
        expr: AVG(UNIT_PRICE)
      - name: AVG_MARGIN_PCT
        description: Average gross margin percentage
        expr: "AVG((UNIT_PRICE - COST_PRICE) / NULLIF(UNIT_PRICE, 0) * 100)"
    filters:
      - name: ACTIVE_PRODUCTS
        description: Only active products
        expr: IS_ACTIVE = TRUE

  - name: ORDERS
    description: Order transactions
    base_table:
      database: RETAIL_AI_TEST
      schema: ANALYTICS
      table: ORDERS
    primary_key:
      columns:
        - ORDER_ID
    dimensions:
      - name: ORDER_ID
        description: Unique order identifier
        expr: ORDER_ID
        data_type: VARCHAR
        unique: true
      - name: CUSTOMER_ID
        description: Foreign key to the customer who placed the order
        expr: CUSTOMER_ID
        data_type: VARCHAR
      - name: ORDER_STATUS
        synonyms:
          - status
        description: Current status of the order
        expr: ORDER_STATUS
        data_type: VARCHAR
        sample_values:
          - Delivered
          - Processing
          - Cancelled
          - Returned
        is_enum: true
      - name: SHIPPING_METHOD
        description: Shipping method selected
        expr: SHIPPING_METHOD
        data_type: VARCHAR
        sample_values:
          - Standard
          - Express
          - Next Day
          - Economy
        is_enum: true
      - name: PAYMENT_METHOD
        description: Payment method used
        expr: PAYMENT_METHOD
        data_type: VARCHAR
        sample_values:
          - Credit Card
          - Debit Card
          - PayPal
          - Gift Card
        is_enum: true
    time_dimensions:
      - name: ORDER_DATE
        synonyms:
          - date ordered
          - purchase date
        description: Date the order was placed
        expr: ORDER_DATE
        data_type: DATE
      - name: SHIP_DATE
        description: Date the order was shipped
        expr: SHIP_DATE
        data_type: DATE
      - name: DELIVERY_DATE
        description: Date the order was delivered
        expr: DELIVERY_DATE
        data_type: DATE
    facts:
      - name: DISCOUNT_PCT
        description: Discount applied as a decimal (0.10 = 10%)
        expr: DISCOUNT_PCT
        data_type: NUMBER
      - name: TOTAL_AMOUNT
        description: Total order amount in USD
        expr: TOTAL_AMOUNT
        data_type: NUMBER
      - name: SHIPPING_COST
        description: Shipping cost in USD
        expr: SHIPPING_COST
        data_type: NUMBER
    metrics:
      - name: TOTAL_ORDERS
        description: Total number of orders placed
        expr: COUNT(ORDER_ID)
      - name: TOTAL_REVENUE
        synonyms:
          - revenue
          - sales
        description: Sum of all order amounts in USD
        expr: SUM(TOTAL_AMOUNT)
      - name: AVG_ORDER_VALUE
        synonyms:
          - AOV
        description: Average order value in USD
        expr: AVG(TOTAL_AMOUNT)
      - name: TOTAL_SHIPPING_REVENUE
        description: Total shipping charges collected
        expr: SUM(SHIPPING_COST)
    filters:
      - name: DELIVERED_ORDERS
        description: Only orders with Delivered status
        expr: "ORDER_STATUS = 'Delivered'"
      - name: ORDERS_THIS_YEAR
        description: Orders placed in 2025 or later
        expr: "ORDER_DATE >= '2025-01-01'"

  - name: ORDER_ITEMS
    description: Order line items
    base_table:
      database: RETAIL_AI_TEST
      schema: ANALYTICS
      table: ORDER_ITEMS
    primary_key:
      columns:
        - ORDER_ITEM_ID
    dimensions:
      - name: ORDER_ITEM_ID
        description: Unique line item identifier
        expr: ORDER_ITEM_ID
        data_type: VARCHAR
        unique: true
      - name: ORDER_ID
        description: Foreign key to the parent order
        expr: ORDER_ID
        data_type: VARCHAR
      - name: PRODUCT_ID
        description: Foreign key to the product
        expr: PRODUCT_ID
        data_type: VARCHAR
    facts:
      - name: QUANTITY
        description: Number of units ordered
        expr: QUANTITY
        data_type: NUMBER
      - name: UNIT_PRICE
        description: Price per unit at time of order in USD
        expr: UNIT_PRICE
        data_type: NUMBER
      - name: DISCOUNT_AMOUNT
        description: Discount applied to this line item in USD
        expr: DISCOUNT_AMOUNT
        data_type: NUMBER
      - name: LINE_TOTAL
        description: Total for this line item after discounts in USD
        expr: LINE_TOTAL
        data_type: NUMBER
    metrics:
      - name: TOTAL_UNITS_SOLD
        description: Total quantity of items sold
        expr: SUM(QUANTITY)
      - name: TOTAL_LINE_REVENUE
        description: Sum of all line item totals
        expr: SUM(LINE_TOTAL)
      - name: AVG_DISCOUNT_PER_ITEM
        description: Average discount amount per line item
        expr: AVG(DISCOUNT_AMOUNT)

  - name: RETURNS
    description: Product returns
    base_table:
      database: RETAIL_AI_TEST
      schema: ANALYTICS
      table: RETURNS
    primary_key:
      columns:
        - RETURN_ID
    dimensions:
      - name: RETURN_ID
        description: Unique return identifier
        expr: RETURN_ID
        data_type: VARCHAR
        unique: true
      - name: ORDER_ID
        description: Foreign key to the original order
        expr: ORDER_ID
        data_type: VARCHAR
      - name: ORDER_ITEM_ID
        description: Foreign key to the specific order item returned
        expr: ORDER_ITEM_ID
        data_type: VARCHAR
      - name: RETURN_REASON
        description: Reason for the return
        expr: RETURN_REASON
        data_type: VARCHAR
        sample_values:
          - Defective
          - Wrong Item
          - Not as Described
          - Changed Mind
          - Too Late
          - Damaged in Shipping
        is_enum: true
      - name: RETURN_STATUS
        description: Current return processing status
        expr: RETURN_STATUS
        data_type: VARCHAR
        sample_values:
          - Approved
          - Pending
          - Rejected
        is_enum: true
    time_dimensions:
      - name: RETURN_DATE
        description: Date the return was initiated
        expr: RETURN_DATE
        data_type: DATE
    facts:
      - name: REFUND_AMOUNT
        description: Amount refunded in USD
        expr: REFUND_AMOUNT
        data_type: NUMBER
    metrics:
      - name: TOTAL_RETURNS
        description: Total number of returns
        expr: COUNT(RETURN_ID)
      - name: TOTAL_REFUNDS
        description: Sum of all refund amounts in USD
        expr: SUM(REFUND_AMOUNT)
      - name: AVG_REFUND_AMOUNT
        description: Average refund amount per return
        expr: AVG(REFUND_AMOUNT)
    filters:
      - name: APPROVED_RETURNS
        description: Only approved returns
        expr: "RETURN_STATUS = 'Approved'"

  - name: STORES
    description: Store locations
    base_table:
      database: RETAIL_AI_TEST
      schema: ANALYTICS
      table: STORES
    primary_key:
      columns:
        - STORE_ID
    dimensions:
      - name: STORE_ID
        description: Unique store identifier
        expr: STORE_ID
        data_type: VARCHAR
        unique: true
      - name: STORE_NAME
        description: Display name of the store
        expr: STORE_NAME
        data_type: VARCHAR
      - name: STORE_TYPE
        description: Type of retail store
        expr: STORE_TYPE
        data_type: VARCHAR
        sample_values:
          - Flagship
          - Outlet
          - Standard
        is_enum: true
      - name: CITY
        description: City where the store is located
        expr: CITY
        data_type: VARCHAR
      - name: STATE
        description: US state abbreviation
        expr: STATE
        data_type: VARCHAR
      - name: REGION
        description: Geographic region
        expr: REGION
        data_type: VARCHAR
        sample_values:
          - Northeast
          - West
          - Midwest
          - South
        is_enum: true
      - name: MANAGER_NAME
        synonyms:
          - manager
        description: Name of the store manager
        expr: MANAGER_NAME
        data_type: VARCHAR
    time_dimensions:
      - name: OPENED_DATE
        description: Date the store opened
        expr: OPENED_DATE
        data_type: DATE
    facts:
      - name: SQUARE_FOOTAGE
        description: Store size in square feet
        expr: SQUARE_FOOTAGE
        data_type: NUMBER
    metrics:
      - name: TOTAL_STORES
        description: Total number of stores
        expr: COUNT(STORE_ID)

relationships:
  - name: ORDERS_TO_CUSTOMERS
    left_table: ORDERS
    right_table: CUSTOMERS
    relationship_columns:
      - left_column: CUSTOMER_ID
        right_column: CUSTOMER_ID
  - name: ORDER_ITEMS_TO_ORDERS
    left_table: ORDER_ITEMS
    right_table: ORDERS
    relationship_columns:
      - left_column: ORDER_ID
        right_column: ORDER_ID
  - name: ORDER_ITEMS_TO_PRODUCTS
    left_table: ORDER_ITEMS
    right_table: PRODUCTS
    relationship_columns:
      - left_column: PRODUCT_ID
        right_column: PRODUCT_ID
  - name: RETURNS_TO_ORDERS
    left_table: RETURNS
    right_table: ORDERS
    relationship_columns:
      - left_column: ORDER_ID
        right_column: ORDER_ID
  - name: RETURNS_TO_ORDER_ITEMS
    left_table: RETURNS
    right_table: ORDER_ITEMS
    relationship_columns:
      - left_column: ORDER_ITEM_ID
        right_column: ORDER_ITEM_ID
