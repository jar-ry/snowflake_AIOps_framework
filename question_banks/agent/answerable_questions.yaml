questions:
  - id: agent_001
    question: "What is our total revenue for 2025?"
    should_answer: true
    expected_answer_contains: ["revenue", "2025"]
    category: data_query
    description: "Standard data question the agent should answer via semantic view"

  - id: agent_002
    question: "Show me the top 5 customers by total spend"
    should_answer: true
    expected_answer_contains: ["customer", "spend"]
    category: data_query
    description: "Ranking question requiring order-customer join"

  - id: agent_003
    question: "What is the return rate by product category?"
    should_answer: true
    expected_answer_contains: ["return", "rate", "category"]
    category: data_query
    description: "Complex query requiring multi-table analysis"

  - id: agent_004
    question: "How are sales trending month over month?"
    should_answer: true
    expected_answer_contains: ["month", "trend"]
    category: data_query
    description: "Time series analysis question"

  - id: agent_005
    question: "Compare revenue across customer segments"
    should_answer: true
    expected_answer_contains: ["segment", "revenue"]
    category: data_query
    description: "Segment comparison requiring aggregation"

  - id: agent_006
    question: "Which shipping method has the fastest delivery time?"
    should_answer: true
    expected_answer_contains: ["shipping", "delivery"]
    category: data_query
    description: "Shipping performance analysis"

  - id: agent_007
    question: "What brands generate the most revenue?"
    should_answer: true
    expected_answer_contains: ["brand", "revenue"]
    category: data_query
    description: "Brand performance ranking"

  - id: agent_008
    question: "Show me a breakdown of orders by payment method"
